upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name localhost habitacao.gov.br www.habitacao.gov.br habitacao.pbi.local;
    charset utf-8;

    # Max upload size
    client_max_body_size 100M;

    # Logs
    access_log /var/log/nginx/habitacao_access.log;
    error_log /var/log/nginx/habitacao_error.log;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check
    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect root to API documentation
    location = / {
        return 302 /api/v1/swagger/;
    }

    # Proxy to Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # WebSocket support (se necessário no futuro)
    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS configuration (auto-assinado para desenvolvimento)
server {
    listen 443 ssl http2;
    server_name localhost habitacao.gov.br www.habitacao.gov.br habitacao.pbi.local;
    charset utf-8;

    # SSL certificates (auto-assinado para desenvolvimento)
    ssl_certificate /etc/nginx/ssl/habitacao.crt;
    ssl_certificate_key /etc/nginx/ssl/habitacao.key;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Max upload size
    client_max_body_size 100M;

    # Logs
    access_log /var/log/nginx/habitacao_access_ssl.log;
    error_log /var/log/nginx/habitacao_error_ssl.log;

    # Compression
